<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Recepción · Barrales & Accesorios</title>

<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rec. Barrales">
<meta name="theme-color" content="#3d4460">
<link rel="apple-touch-icon" href="https://barralesyaccesorios.com.ar/wp-content/uploads/2024/09/Logotipo-Blanco.png">
<link rel="icon" type="image/png" href="https://barralesyaccesorios.com.ar/wp-content/uploads/2024/09/Logotipo-Blanco.png">

<link rel="manifest" href='data:application/json,{"name":"Recepcion Barrales","short_name":"Rec. Barrales","start_url":"./index.html","display":"standalone","background_color":"#eef0f5","theme_color":"#3d4460","icons":[{"src":"https://barralesyaccesorios.com.ar/wp-content/uploads/2024/09/Logotipo-Blanco.png","sizes":"192x192","type":"image/png"}]}'>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
:root {
  --navy: #3d4460; --navy-dk: #2c3050; --navy-mid: #4a5070;
  --bg: #eef0f5; --surface: #ffffff; --border: #c8ccd8;
  --accent: #5a6080; --text: #1e2238; --muted: #6b7190;
  --chip-bg: #e4e7f0; --green: #3a7d5a; --orange: #b07820; --red: #b03030;
  --shadow: 0 3px 16px rgba(30,34,56,0.13); --radius: 14px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  background: var(--bg); 
  color: var(--text); 
  /* Fuente del sistema para evitar depender de Google Fonts online */
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
  min-height: 100vh; 
  padding-bottom: 50px; 
}

/* Estilos de la App */
header { background: var(--navy); position: sticky; top: 0; z-index: 200; box-shadow: 0 3px 18px rgba(20,24,50,0.45); }
.header-top { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,0.10); }
.logo-img { height: 52px; object-fit: contain; }
.header-right { text-align: right; color: #fff; }
.h-sub { font-size: 0.62rem; font-weight: 700; opacity: 0.5; text-transform: uppercase; }
.tabs { display: flex; background: var(--navy-dk); }
.tab-btn { flex: 1; border: none; background: none; padding: 12px; color: rgba(255,255,255,0.5); font-weight: 700; font-size: 0.75rem; text-transform: uppercase; border-bottom: 3px solid transparent; }
.tab-btn.active { color: #fff; border-bottom-color: #fff; background: rgba(255,255,255,0.05); }
.container { max-width: 540px; margin: 0 auto; padding: 16px; }
.pane { display: none; }
.pane.active { display: block; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 15px; margin-bottom: 12px; box-shadow: var(--shadow); }
.section-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.section-label::before { content:''; width: 3px; height: 12px; background: var(--navy); border-radius: 2px; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip { background: var(--chip-bg); border: 1.5px solid var(--border); border-radius: 50px; padding: 8px 14px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
.chip.sel { background: var(--navy); border-color: var(--navy); color: #fff; }
input[type="number"], textarea { width: 100%; background: var(--chip-bg); border: 1.5px solid var(--border); border-radius: 10px; padding: 12px; font-size: 1rem; outline: none; margin-top: 5px; }
.btn-main { width: 100%; background: var(--navy); color: #fff; border: none; border-radius: 12px; padding: 16px; font-weight: 700; font-size: 1rem; margin-top: 10px; }
.btn-main:disabled { background: var(--border); }
.btn-xlsx { width: 100%; background: #217346; color: #fff; border: none; border-radius: 12px; padding: 15px; font-weight: 700; margin-top: 10px; }
.reg-item { border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-bottom: 8px; background: #f9f9f9; position: relative; }
.reg-prod { font-weight: 700; color: var(--navy); }
.reg-detail { font-size: 0.8rem; color: var(--muted); }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; display: none; z-index: 1000; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <img class="logo-img" src="https://barralesyaccesorios.com.ar/wp-content/uploads/2024/09/Logotipo-Blanco.png" alt="Logo">
    <div class="header-right">
      <div class="h-sub">Madera</div>
      <div id="hHora" style="font-weight:700">--:--</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('nuevo',this)">Nuevo</button>
    <button class="tab-btn" onclick="showTab('hoy',this)">Hoy</button>
  </div>
</header>

<div class="container">
  <div class="pane active" id="pane-nuevo">
    <div class="card">
      <div class="section-label">Producto</div>
      <div class="chips" id="c-producto">
        <div class="chip" data-val="SOPORTE" onclick="sel(this,'producto')">SOPORTE</div>
        <div class="chip" data-val="TERMINAL" onclick="sel(this,'producto')">TERMINAL</div>
        <div class="chip" data-val="ARGOLLA" onclick="sel(this,'producto')">ARGOLLA</div>
        <div class="chip" data-val="BARRAL" onclick="sel(this,'producto')">BARRAL</div>
      </div>
    </div>
    <div class="card">
        <label style="font-size:0.7rem; font-weight:700; color:var(--muted)">CANTIDAD</label>
        <input type="number" id="n-cantidad" placeholder="0" oninput="checkBtn()">
    </div>
    <div class="card">
      <div class="section-label">Estado</div>
      <div class="chips" id="c-estado">
        <div class="chip" data-val="BUENO" onclick="sel(this,'estado')">Bueno</div>
        <div class="chip" data-val="REGULAR" onclick="sel(this,'estado')">Regular</div>
        <div class="chip" data-val="MALO" onclick="sel(this,'estado')">Malo</div>
      </div>
    </div>
    <button class="btn-main" id="btnReg" onclick="registrar()" disabled>Registrar</button>
  </div>

  <div class="pane" id="pane-hoy">
    <div id="listaHoy"></div>
    <button class="btn-xlsx" id="btnXlsx" onclick="descargarXlsx()" disabled>Descargar Excel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const FORM = { producto:null, estado:null };

function tick() {
  document.getElementById('hHora').textContent = new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
}
tick(); setInterval(tick, 10000);

function showTab(name, btn) {
  document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pane-' + name).classList.add('active');
  btn.classList.add('active');
  if(name === 'hoy') renderHoy();
}

function sel(el, g) {
  document.querySelectorAll(`#c-${g} .chip`).forEach(c => c.classList.remove('sel'));
  el.classList.add('sel'); FORM[g] = el.dataset.val; checkBtn();
}

function checkBtn() {
  const cant = document.getElementById('n-cantidad').value;
  document.getElementById('btnReg').disabled = !(FORM.producto && FORM.estado && cant > 0);
}

function registrar() {
  const cant = document.getElementById('n-cantidad').value;
  const reg = {
    id: Date.now(),
    hora: new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'}),
    producto: FORM.producto,
    cantidad: cant,
    estado: FORM.estado
  };
  const hoy = JSON.parse(localStorage.getItem('hoy') || '[]');
  hoy.unshift(reg);
  localStorage.setItem('hoy', JSON.stringify(hoy));
  toast("✅ Registrado");
  location.reload(); // Recarga para asegurar que el storage se limpie
}

function renderHoy() {
  const hoy = JSON.parse(localStorage.getItem('hoy') || '[]');
  const lista = document.getElementById('listaHoy');
  document.getElementById('btnXlsx').disabled = hoy.length === 0;
  lista.innerHTML = hoy.map(r => `
    <div class="reg-item">
      <div class="reg-prod">${r.producto}</div>
      <div class="reg-detail">${r.cantidad} unid. - ${r.estado} (${r.hora})</div>
    </div>
  `).join('') || '<p style="text-align:center; padding:20px; color:gray">No hay registros</p>';
}

function descargarXlsx() {
  const hoy = JSON.parse(localStorage.getItem('hoy') || '[]');
  const ws = XLSX.utils.json_to_sheet(hoy);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Recepcion");
  XLSX.writeFile(wb, "Recepcion_Hoy.xlsx");
}

function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}

// SERVICE WORKER PARA MODO OFFLINE
if ('serviceWorker' in navigator) {
  const swCode = `
    const cacheName = 'v3';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(cacheName).then(cache => cache.addAll(['./', './index.html', 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js'])));
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
    });
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob));
}
</script>
</body>
</html>
